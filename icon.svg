<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Casal no Controle">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#123A5C"/>
      <stop offset="100%" stop-color="#0E7C5A"/>
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect width="120" height="120" rx="26" fill="url(#bgGrad)"/>

  <!-- Três barras ascendentes — o crescimento conjunto do casal -->
  <rect x="26" y="60" width="22" height="32" rx="5" fill="#FFFFFF" fill-opacity="0.85"/>
  <rect x="50" y="42" width="22" height="50" rx="5" fill="#E9DAB8"/>
  <rect x="74" y="24" width="22" height="68" rx="5" fill="#C9A463"/>

  <!-- Sol / ponto de prosperidade -->
  <circle cx="85" cy="16" r="6" fill="#FFFFFF"/>

  <!-- Base -->
  <line x1="20" y1="96" x2="100" y2="96" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="2.5" stroke-linecap="round"/>
</svg>
